openapi: 3.1.0
info:
  title: IpeSign API
  version: 0.1.0
  description: Initial contract for the IpeSign web backend.
servers:
  - url: http://localhost:8080
paths:
  /v1/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /v1/ca:
    get:
      summary: Get CA metadata
      responses:
        "200":
          description: CA metadata
  /v1/documents/sign:
    post:
      summary: Sign a PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - pdf
              properties:
                pdf:
                  type: string
                  format: binary
                policy_id:
                  type: string
      responses:
        "200":
          description: Document signed
  /v1/documents/verify:
    post:
      summary: Verify a signed PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - pdf
                - certificate_pem
                - signature_base64
              properties:
                pdf:
                  type: string
                  format: binary
                certificate_pem:
                  type: string
                signature_base64:
                  type: string
      responses:
        "200":
          description: Verification result
  /v1/records/{recordId}:
    get:
      summary: Get record metadata
      parameters:
        - in: path
          name: recordId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Record metadata
